        <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenSpend | Daybreak</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #4f46e5; --logic: #06b6d4; --emotion: #f43f5e; }
        
        body { 
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(125deg, #f0f9ff 0%, #e0e7ff 50%, #f5f3ff 100%);
            color: #1e293b;
            min-height: 100vh;
        }

        /* 1. ANIMATED MESH GRADIENT BACKGROUND */
        .mesh-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(6, 182, 212, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(124, 58, 237, 0.1) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(244, 63, 94, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(79, 70, 229, 0.1) 0px, transparent 50%);
        }

        /* 2. BRIGHT FROSTED GLASS */
        .frosted-glass {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
            transition: all 0.4s ease;
        }
        .frosted-glass:hover {
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
        }

        /* 3. SHAPES THAT POP */
        .shape-slant { clip-path: polygon(0 5%, 100% 0, 100% 95%, 0 100%); }
        .shape-blob { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }

        .reveal { opacity: 0; transform: translateY(20px); transition: 0.8s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        .gradient-text {
            background: linear-gradient(to right, var(--accent), var(--logic));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="mesh-bg"></div>

    <div class="max-w-6xl mx-auto space-y-12">
        
        <nav class="frosted-glass p-6 rounded-[2rem] flex justify-between items-center sticky top-4 z-50">
            <h1 class="text-2xl font-800 tracking-tighter gradient-text uppercase">ZenSpend</h1>
            <div class="flex gap-4">
                <span id="score-val" class="bg-indigo-600 text-white px-4 py-1 rounded-full text-xs font-bold shadow-lg shadow-indigo-200">100 PTS</span>
            </div>
        </nav>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-7 space-y-10">
                
                <section class="text-center md:text-left reveal">
                    <div class="inline-block relative">
                        <div class="w-40 h-40 rounded-full bg-white flex items-center justify-center shadow-xl border-4 border-indigo-50 relative z-10">
                            <h2 class="text-6xl font-800 text-slate-800" id="mainScore">100</h2>
                        </div>
                        <div class="absolute -inset-4 bg-indigo-200/30 rounded-full blur-xl animate-pulse"></div>
                    </div>
                    <p class="mt-6 text-slate-500 font-medium italic">"Discipline is the bridge between goals and accomplishment."</p>
                </section>

                <section class="frosted-glass shape-slant p-12 reveal">
                    <h3 class="text-lg font-800 text-slate-800 mb-6">Capture Energy</h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                        <input id="item" type="text" placeholder="Entry Label" class="bg-white/50 p-4 rounded-xl border-none focus:ring-2 focus:ring-indigo-400 outline-none">
                        <input id="amount" type="number" placeholder="Value ($)" class="bg-white/50 p-4 rounded-xl border-none focus:ring-2 focus:ring-indigo-400 outline-none">
                    </div>
                    <div class="flex gap-4">
                        <button onclick="addEntry(true)" class="flex-1 bg-slate-900 text-white py-4 rounded-xl font-800 text-xs uppercase hover:bg-slate-800 transition">Logic (Need)</button>
                        <button onclick="addEntry(false)" class="flex-1 bg-indigo-600 text-white py-4 rounded-xl font-800 text-xs uppercase hover:bg-indigo-500 transition shadow-lg shadow-indigo-200">Emotion (Want)</button>
                    </div>
                </section>

                <div id="feed" class="space-y-6">
                    </div>
            </div>

            <aside class="lg:col-span-5 space-y-10">
                
                <div class="frosted-glass p-8 rounded-[2.5rem] reveal">
                    <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-2">Monthly Leakage</p>
                    <h4 id="total-val" class="text-4xl font-800 text-slate-800">$0.00</h4>
                    <div class="mt-6 h-1.5 w-full bg-slate-100 rounded-full overflow-hidden">
                        <div id="pBar" class="h-full bg-indigo-500 transition-all duration-1000" style="width: 100%"></div>
                    </div>
                </div>

                <div class="frosted-glass p-8 rounded-[2.5rem] reveal">
                    <h4 class="text-xs font-800 text-slate-800 mb-4">Mind-Finance Journal</h4>
                    <textarea id="journal" oninput="saveJournal()" class="w-full bg-transparent border-none focus:ring-0 text-sm h-32 italic text-slate-500" placeholder="Note the subconscious trigger..."></textarea>
                </div>

            </aside>
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('zenScore')) || 100;
        let logs = JSON.parse(localStorage.getItem('zenLogs')) || [];

        function updateUI() {
            document.getElementById('mainScore').innerText = score;
            document.getElementById('score-val').innerText = `${score} PTS`;
            document.getElementById('pBar').style.width = score + "%";
            
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            let total = 0;

            logs.forEach(log => {
                total += parseFloat(log.amount);
                const card = document.createElement('div');
                card.className = "frosted-glass p-6 rounded-[2rem] flex justify-between items-center reveal active " + (log.isNeed ? 'border-l-8 border-cyan-400' : 'shape-blob border-l-8 border-rose-400');
                card.innerHTML = `
                    <div>
                        <p class="font-800 text-slate-800">${log.item}</p>
                        <p class="text-[9px] text-slate-400 uppercase font-bold">${log.isNeed ? 'Logical Asset' : 'Subconscious Urge'}</p>
                    </div>
                    <p class="text-2xl font-800 ${log.isNeed ? 'text-cyan-600' : 'text-rose-500'}">$${log.amount}</p>
                `;
                feed.prepend(card);
            });

            document.getElementById('total-val').innerText = `$${total.toFixed(2)}`;
            localStorage.setItem('zenScore', score);
            localStorage.setItem('zenLogs', JSON.stringify(logs));
            initReveal();
        }

        function addEntry(isNeed) {
            const item = document.getElementById('item').value;
            const amount = document.getElementById('amount').value;
            if(!item || !amount) return;
            isNeed ? score = Math.min(100, score + 5) : score = Math.max(0, score - Math.floor(amount/3));
            logs.push({item, amount, isNeed});
            document.getElementById('item').value = ''; document.getElementById('amount').value = '';
            updateUI();
        }

        function saveJournal() { localStorage.setItem('zenJournal', document.getElementById('journal').value); }
        function initReveal() {
            const obs = new IntersectionObserver((e) => { e.forEach(x => { if(x.isIntersecting) x.target.classList.add('active'); }); });
            document.querySelectorAll('.reveal').forEach(r => obs.observe(r));
        }

        window.onload = () => {
            document.getElementById('journal').value = localStorage.getItem('zenJournal') || '';
            updateUI();
        };
    </script>
</body>
</html>
