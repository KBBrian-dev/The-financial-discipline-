<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenSpend | Galactic Surface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00f2fe; --royal: #7c3aed; }
        body { 
            background: #030014; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif;
            transition: 0.3s background ease; overflow-x: hidden;
        }
        
        /* 1. FUTURISTIC BACKGROUND */
        .parallax-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background-image: linear-gradient(rgba(3,0,20,0.8), rgba(3,0,20,1)),
                              url('https://images.unsplash.com/photo-1599672721868-b76bb06b3a01?q=80&w=2000');
            background-size: cover; background-position: center; filter: blur(5px);
        }
        
        /* 2. HIGH-CONTRAST NEON-GLASS SURFACE */
        .neon-glass { 
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .neon-glass:hover { border-color: var(--neon); box-shadow: 0 0 30px rgba(0, 242, 254, 0.15); }
        
        /* 3. DYNAMIC SHAPES (MOD MOBILE, WIDE DESKTOP) */
        .shape-slant { clip-path: polygon(0 8%, 100% 0, 100% 92%, 0 100%); }
        .shape-blob { border-radius: 40% 60% 70% 30% / 40% 40% 60% 60%; }

        .reveal { opacity: 0; transform: translateY(40px); transition: 1s all ease; }
        .reveal.active { opacity: 1; transform: translateY(0); }
        
        /* Modal Base */
        #insightModal { 
            display: none; position: fixed; inset: 0; z-index: 100;
            background: rgba(3, 0, 20, 0.98); align-items: center; justify-content: center; padding: 2rem;
        }
    </style>
</head>
<body class="p-0">

    <div class="parallax-bg" id="parallax"></div>

    <div id="insightModal">
        <div class="neon-glass p-12 rounded-[3.5rem] text-center max-w-xl border-t-4 border-cyan-400">
            <h2 class="text-2xl font-800 text-cyan-400 mb-6 tracking-tighter uppercase">Subconscious Breakthrough</h2>
            
            [attachment_0](attachment)
            <p id="insightContent" class="text-sm text-slate-300 leading-relaxed italic mb-10"></p>
            
            <button onclick="closeModal()" class="bg-white text-black px-8 py-3 rounded-full font-800 text-xs uppercase tracking-widest active:scale-95 transition">Acknowledge</button>
        </div>
    </div>

    <nav class="sticky top-0 z-50 neon-glass m-4 rounded-2xl px-10 py-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-2xl font-800 tracking-tighter uppercase italic">ZEN<span class="text-cyan-400">SPEND</span></h1>
        <div id="score-pill" class="text-cyan-400 border border-cyan-400/50 px-4 py-1 rounded-full text-xs font-bold">100 PTS</div>
    </nav>

    <main class="max-w-7xl mx-auto py-20 px-6 grid grid-cols-1 lg:grid-cols-12 gap-10">

        <div class="lg:col-span-7 space-y-10">
            
            <section class="text-center md:text-left reveal">
                <div class="inline-block relative p-4">
                    <div class="w-48 h-48 rounded-full border-2 border-dashed border-cyan-400/20 absolute inset-0 animate-spin-slow opacity-30"></div>
                    <div class="text-center relative z-10">
                        <h2 class="text-8xl font-800" id="mainScore">100</h2>
                        <p class="text-[10px] text-slate-500 font-black uppercase tracking-[0.3em]">Frequency</p>
                    </div>
                </div>
                <p class="mt-8 text-slate-300 italic text-sm">"By delaying a purchase, you are strengthening your prefrontal cortex."</p>
            </section>

            <section class="neon-glass shape-slant p-16 reveal">
                <h3 class="text-xl font-800 tracking-tight mb-6">Log Energy Flux</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">
                    <input id="item" type="text" placeholder="Entry Label" class="bg-black/40 p-5 rounded-xl outline-none border border-white/10 focus:border-cyan-400 text-white">
                    <input id="amount" type="number" placeholder="Cost ($)" class="bg-black/40 p-5 rounded-xl outline-none border border-white/10 focus:border-cyan-400 text-white">
                </div>
                <div class="flex gap-4 flex-col md:flex-row">
                    <button onclick="addEntry(true)" class="flex-1 bg-white text-black py-4 rounded-xl font-800 text-xs uppercase active:scale-95 transition">Logic (Need)</button>
                    <button onclick="addEntry(false)" class="flex-1 bg-royal text-white py-4 rounded-xl font-800 text-xs uppercase active:scale-95 transition">Impulse (Want)</button>
                </div>
            </section>

            <div id="feed" class="space-y-4">
                </div>
        </div>

        <aside class="lg:col-span-5 lg:sticky lg:top-36 self-start space-y-10">
            
            <div class="neon-glass p-8 rounded-[2.5rem] reveal">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-widest">Total Energy Leakage</span>
                    <span id="total-val" class="text-rose-400 font-bold">$0.00</span>
                </div>
                <div class="h-1 bg-white/5 rounded-full overflow-hidden">
                    <div id="pBar" class="h-full bg-cyan-400 transition-all duration-1000" style="width: 100%"></div>
                </div>
            </div>

            <div class="neon-glass p-8 rounded-[2.5rem] reveal">
                <h4 class="text-xs font-bold uppercase tracking-widest text-cyan-400 mb-4">Thought Log</h4>
                <textarea id="journal" oninput="saveJournal()" class="w-full bg-transparent text-xs h-32 outline-none placeholder:text-slate-700 resize-none border-b border-white/5" placeholder="Record the emotion behind your last purchase..."></textarea>
            </div>
        </aside>
    </main>

    <script>
        let score = parseInt(localStorage.getItem('zenScore')) || 100;
        let logs = JSON.parse(localStorage.getItem('zenLogs')) || [];
        const insights = [
            "Neuroplasticity is your super-power. When you hit 'Essential', you are firing the prefrontal cortex, which physically changes your brain's structure for long-term willpower.",
            "That 'Want' urge? It’s a legacy of Evolutionary Biology. Your ancestors survived by reacting to immediate rewards. Today, your prefrontal cortex overrides this ancient survival loop.",
            "Energy and Entropy: In physics, entropy is natural disorder. Your finances are the same. Discipline (Logic) is the vital energy you inject into your system to maintain financial order."
        ];

        // Parallax Effect
        window.addEventListener('scroll', () => {
            const parallax = document.getElementById('parallax');
            parallax.style.backgroundPositionY = -(window.scrollY * 0.2) + 'px';
        });

        function updateUI() {
            document.getElementById('mainScore').innerText = score;
            document.getElementById('pBar').style.width = score + "%";
            
            const feed = document.getElementById('feed');
            feed.innerHTML = '';
            let total = 0, wants = 0;

            logs.forEach(log => {
                total += parseFloat(log.amount);
                if(!log.isNeed) wants += parseFloat(log.amount);

                const card = document.createElement('div');
                // APPLY UNIQUE BLOB SHAPE PER CATEGORY
                card.className = "neon-glass p-8 group transition-all duration-500 " + (log.isNeed ? 'shape-blob border-emerald-500 hover:bg-emerald-500/10' : 'shape-blob border-rose-500 hover:bg-rose-500/10');
                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <div>
                            <p class="font-800 text-white">${log.item}</p>
                            <p class="text-[9px] text-slate-500 uppercase tracking-widest font-black">${log.isNeed ? 'Logical Energy' : 'Subconscious Urge'}</p>
                        </div>
                        <p class="text-2xl font-800 ${log.isNeed ? 'text-emerald-400' : 'text-rose-400'}">$${log.amount}</p>
                    </div>
                `;
                feed.prepend(card);
            });

            document.getElementById('total-val').innerText = `$${total.toFixed(2)}`;
            if(score >= 100) triggerInsight();
            initScrollReveal();
            localStorage.setItem('zenScore', score); localStorage.setItem('zenLogs', JSON.stringify(logs));
        }

        function addEntry(isNeed) {
            const item = document.getElementById('item').value;
            const amount = document.getElementById('amount').value;
            if(!item || !amount) return;
            isNeed ? score = Math.min(100, score + 4) : score = Math.max(0, score - Math.floor(amount/2.5));
            logs.push({item, amount, isNeed});
            document.getElementById('item').value = ''; document.getElementById('amount').value = '';
            updateUI();
        }

        function triggerInsight() {
            const randomInsight = insights[Math.floor(Math.random() * insights.length)];
            document.getElementById('insightContent').innerText = randomInsight;
            document.getElementById('insightModal').style.display = 'flex';
        }
        function closeModal() { document.getElementById('insightModal').style.display = 'none'; }
        function saveJournal() { localStorage.setItem('zenJournal', document.getElementById('journal').value); }
        function initScrollReveal() {
            const obs = new IntersectionObserver((e) => { e.forEach(x => { if(x.isIntersecting) x.target.classList.add('active'); }); }, { threshold: 0.1 });
            document.querySelectorAll('.reveal').forEach(r => obs.observe(r));
        }

        window.onload = () => {
            document.getElementById('journal').value = localStorage.getItem('zenJournal') || '';
            updateUI();
        };
    </script>
</body>
</html>
