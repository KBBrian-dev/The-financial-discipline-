<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenSpend | Discipline Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-md mx-auto space-y-6">
        <header class="text-center">
            <h1 class="text-3xl font-bold text-emerald-400">ZenSpend</h1>
            <p class="text-slate-400 text-sm italic">Master your money, master your mind.</p>
        </header>

        <div class="glass p-6 rounded-3xl text-center shadow-xl">
            <p class="text-xs uppercase tracking-widest text-slate-400">Discipline Points</p>
            <div id="score" class="text-6xl font-black text-white my-2">100</div>
            <div class="w-full bg-slate-800 h-2 rounded-full overflow-hidden">
                <div id="scoreBar" class="bg-emerald-500 h-full transition-all duration-500" style="width: 100%"></div>
            </div>
        </div>

        <div class="glass p-6 rounded-3xl space-y-4">
            <input id="item" type="text" placeholder="What did you buy?" class="w-full bg-slate-800 border-none rounded-xl p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
            <input id="amount" type="number" placeholder="Amount ($)" class="w-full bg-slate-800 border-none rounded-xl p-3 text-white focus:ring-2 focus:ring-emerald-500 outline-none">
            
            <div class="flex gap-2">
                <button onclick="addExpense(true)" class="flex-1 bg-emerald-600 hover:bg-emerald-500 py-3 rounded-xl font-bold transition">Need</button>
                <button onclick="addExpense(false)" class="flex-1 bg-rose-600 hover:bg-rose-500 py-3 rounded-xl font-bold transition">Want</button>
            </div>
        </div>

        <div class="space-y-3">
            <h2 class="text-lg font-semibold px-2 text-slate-300">Recent Spending</h2>
            <div id="history" class="space-y-2">
                </div>
        </div>
    </div>

    <script>
        let score = 100;
        const historyDiv = document.getElementById('history');
        const scoreDisplay = document.getElementById('score');
        const scoreBar = document.getElementById('scoreBar');

        function addExpense(isNeed) {
            const item = document.getElementById('item').value;
            const amount = document.getElementById('amount').value;

            if (!item || !amount) return alert("Fill in the details!");

            // Discipline Logic: Lose points for "Wants", maintain for "Needs"
            if (!isNeed) {
                score -= Math.floor(amount / 5);
                if (score < 0) score = 0;
            } else {
                score += 2; // Small bonus for being responsible
                if (score > 100) score = 100;
            }

            updateUI(item, amount, isNeed);
            
            // Clear inputs
            document.getElementById('item').value = '';
            document.getElementById('amount').value = '';
        }

        function updateUI(item, amount, isNeed) {
            scoreDisplay.innerText = score;
            scoreBar.style.width = score + "%";
            
            // Color logic for bar
            if (score < 40) scoreBar.className = "bg-rose-500 h-full transition-all duration-500";
            else if (score < 70) scoreBar.className = "bg-amber-500 h-full transition-all duration-500";
            else scoreBar.className = "bg-emerald-500 h-full transition-all duration-500";

            // Add to history list
            const entry = document.createElement('div');
            entry.className = "glass p-4 rounded-2xl flex justify-between items-center animate-fade-in";
            entry.innerHTML = `
                <div>
                    <p class="font-medium">${item}</p>
                    <p class="text-xs ${isNeed ? 'text-emerald-400' : 'text-rose-400'}">${isNeed ? 'Essential' : 'Luxury / Want'}</p>
                </div>
                <span class="font-bold text-lg">$${amount}</span>
            `;
            historyDiv.prepend(entry);
        }
    </script>
</body>
</html>
